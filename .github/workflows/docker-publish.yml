name: Docker Publish (GHCR)

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      publish:
        description: 'Publish image to GHCR (set false for build-only)'
        required: true
        type: boolean
        default: true

# Queue runs instead of canceling an in-flight publish — avoids overlapping GHCR
# pushes and half-published tags that later fail with "manifest not found".
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io

jobs:
  build-test-scan:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      - name: Format check
        run: npm run format:check

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Tests
        run: npm test

      - name: Docker config check
        run: npm run docker:check

      - name: Build (pre-publish gate)
        run: npm run build

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build local image (for scanning)
        id: build_local
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: false
          load: true
          tags: |
            web-notes-e1-scan:${{ github.sha }}

      - name: Trivy vulnerability scan
        uses: aquasecurity/trivy-action@v0.24.0
        with:
          image-ref: web-notes-e1-scan:${{ github.sha }}
          format: table
          severity: 'HIGH,CRITICAL'
          exit-code: '1'
          scanners: 'vuln'
          trivyignores: '.trivyignore'

      - name: Login to GHCR
        if: ${{ github.event_name != 'workflow_dispatch' || inputs.publish == true }}
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Image name (lowercase, required by GHCR)
        run: echo "IMAGE_NAME=${REGISTRY}/$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_ENV"

      - name: Docker image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=tag
            type=sha
            type=raw,value=latest,enable=${{ github.event_name == 'push' }}

      - name: Build & push to GHCR
        if: ${{ github.event_name != 'workflow_dispatch' || inputs.publish == true }}
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  cleanup:
    name: Cleanup untagged GHCR versions
    needs: build-test-scan
    runs-on: ubuntu-latest
    if: ${{ github.event_name != 'workflow_dispatch' || inputs.publish == true }}
    permissions:
      packages: write
      contents: read
    steps:
      - name: Delete old untagged package versions
        uses: actions/delete-package-versions@v5
        with:
          package-name: ${{ github.event.repository.name }}
          package-type: container
          min-versions-to-keep: 20
          delete-only-untagged-versions: true
