<?xml version="1.0" encoding="UTF-8"?>
<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Modern gradient: Blue 700 → Blue 900 -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1976d2;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0d47a1;stop-opacity:1" />
    </linearGradient>
    
    <!-- Subtle shadow for note -->
    <filter id="noteShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="7.68"/>
      <feOffset dx="0" dy="10.24"/>
      <feComponentTransfer>
        <feFuncA type="linear" slope="0.25"/>
      </feComponentTransfer>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Background with rounded corners -->
  <rect width="512" height="512" rx="92.16" fill="url(#bgGrad)"/>
  
  <!-- Note icon with shadow -->
  <g filter="url(#noteShadow)">
    <!-- White note paper -->
    <rect x="140.8" y="104.96" width="230.4" height="281.6" 
          rx="17.92" fill="#ffffff"/>
    
    <!-- Note lines (subtle blue) -->
    <line x1="182.27200000000002" y1="189.44" 
          x2="329.728" y2="189.44" 
          stroke="#1565c0" stroke-width="4.096" 
          stroke-linecap="round" opacity="0.35"/>
    <line x1="182.27200000000002" y1="240.128" 
          x2="329.728" y2="240.128" 
          stroke="#1565c0" stroke-width="4.096" 
          stroke-linecap="round" opacity="0.35"/>
    <line x1="182.27200000000002" y1="290.816" 
          x2="279.04" y2="290.816" 
          stroke="#1565c0" stroke-width="4.096" 
          stroke-linecap="round" opacity="0.35"/>
    
    <!-- Folded corner accent -->
    <path d="M 320.51200000000006 104.96 
             L 371.20000000000005 104.96 
             L 371.20000000000005 155.648 
             Q 359.68000000000006 147.2
               325.12000000000006 127.488 Z" 
          fill="#e3f2fd" opacity="0.8"/>
  </g>
</svg>