<?xml version="1.0" encoding="UTF-8"?>
<svg width="384" height="384" viewBox="0 0 384 384" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Modern gradient: Blue 700 → Blue 900 -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1976d2;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0d47a1;stop-opacity:1" />
    </linearGradient>
    
    <!-- Subtle shadow for note -->
    <filter id="noteShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="5.76"/>
      <feOffset dx="0" dy="7.68"/>
      <feComponentTransfer>
        <feFuncA type="linear" slope="0.25"/>
      </feComponentTransfer>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Background with rounded corners -->
  <rect width="384" height="384" rx="69.12" fill="url(#bgGrad)"/>
  
  <!-- Note icon with shadow -->
  <g filter="url(#noteShadow)">
    <!-- White note paper -->
    <rect x="105.6" y="78.72" width="172.8" height="211.20000000000002" 
          rx="13.440000000000001" fill="#ffffff"/>
    
    <!-- Note lines (subtle blue) -->
    <line x1="136.704" y1="142.07999999999998" 
          x2="247.296" y2="142.07999999999998" 
          stroke="#1565c0" stroke-width="3.072" 
          stroke-linecap="round" opacity="0.35"/>
    <line x1="136.704" y1="180.09599999999998" 
          x2="247.296" y2="180.09599999999998" 
          stroke="#1565c0" stroke-width="3.072" 
          stroke-linecap="round" opacity="0.35"/>
    <line x1="136.704" y1="218.11199999999997" 
          x2="209.28" y2="218.11199999999997" 
          stroke="#1565c0" stroke-width="3.072" 
          stroke-linecap="round" opacity="0.35"/>
    
    <!-- Folded corner accent -->
    <path d="M 240.38399999999996 78.72 
             L 278.4 78.72 
             L 278.4 116.73599999999999 
             Q 269.76 110.4
               243.83999999999997 95.616 Z" 
          fill="#e3f2fd" opacity="0.8"/>
  </g>
</svg>