<?xml version="1.0" encoding="UTF-8"?>
<svg width="152" height="152" viewBox="0 0 152 152" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Modern gradient: Blue 700 → Blue 900 -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1976d2;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0d47a1;stop-opacity:1" />
    </linearGradient>
    
    <!-- Subtle shadow for note -->
    <filter id="noteShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="2.28"/>
      <feOffset dx="0" dy="3.04"/>
      <feComponentTransfer>
        <feFuncA type="linear" slope="0.25"/>
      </feComponentTransfer>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Background with rounded corners -->
  <rect width="152" height="152" rx="27.36" fill="url(#bgGrad)"/>
  
  <!-- Note icon with shadow -->
  <g filter="url(#noteShadow)">
    <!-- White note paper -->
    <rect x="41.8" y="31.159999999999997" width="68.4" height="83.60000000000001" 
          rx="5.32" fill="#ffffff"/>
    
    <!-- Note lines (subtle blue) -->
    <line x1="54.111999999999995" y1="56.239999999999995" 
          x2="97.888" y2="56.239999999999995" 
          stroke="#1565c0" stroke-width="1.5" 
          stroke-linecap="round" opacity="0.35"/>
    <line x1="54.111999999999995" y1="71.288" 
          x2="97.888" y2="71.288" 
          stroke="#1565c0" stroke-width="1.5" 
          stroke-linecap="round" opacity="0.35"/>
    <line x1="54.111999999999995" y1="86.336" 
          x2="82.84" y2="86.336" 
          stroke="#1565c0" stroke-width="1.5" 
          stroke-linecap="round" opacity="0.35"/>
    
    <!-- Folded corner accent -->
    <path d="M 95.152 31.159999999999997 
             L 110.2 31.159999999999997 
             L 110.2 46.208 
             Q 106.78 43.699999999999996
               96.52 37.848 Z" 
          fill="#e3f2fd" opacity="0.8"/>
  </g>
</svg>