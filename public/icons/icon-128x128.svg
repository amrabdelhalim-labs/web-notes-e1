<?xml version="1.0" encoding="UTF-8"?>
<svg width="128" height="128" viewBox="0 0 128 128" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Modern gradient: Blue 700 → Blue 900 -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1976d2;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0d47a1;stop-opacity:1" />
    </linearGradient>
    
    <!-- Subtle shadow for note -->
    <filter id="noteShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="1.92"/>
      <feOffset dx="0" dy="2.56"/>
      <feComponentTransfer>
        <feFuncA type="linear" slope="0.25"/>
      </feComponentTransfer>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Background with rounded corners -->
  <rect width="128" height="128" rx="23.04" fill="url(#bgGrad)"/>
  
  <!-- Note icon with shadow -->
  <g filter="url(#noteShadow)">
    <!-- White note paper -->
    <rect x="35.2" y="26.24" width="57.6" height="70.4" 
          rx="4.48" fill="#ffffff"/>
    
    <!-- Note lines (subtle blue) -->
    <line x1="45.568000000000005" y1="47.36" 
          x2="82.432" y2="47.36" 
          stroke="#1565c0" stroke-width="1.5" 
          stroke-linecap="round" opacity="0.35"/>
    <line x1="45.568000000000005" y1="60.032" 
          x2="82.432" y2="60.032" 
          stroke="#1565c0" stroke-width="1.5" 
          stroke-linecap="round" opacity="0.35"/>
    <line x1="45.568000000000005" y1="72.704" 
          x2="69.76" y2="72.704" 
          stroke="#1565c0" stroke-width="1.5" 
          stroke-linecap="round" opacity="0.35"/>
    
    <!-- Folded corner accent -->
    <path d="M 80.12800000000001 26.24 
             L 92.80000000000001 26.24 
             L 92.80000000000001 38.912 
             Q 89.92000000000002 36.8
               81.28000000000002 31.872 Z" 
          fill="#e3f2fd" opacity="0.8"/>
  </g>
</svg>