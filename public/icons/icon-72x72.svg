<?xml version="1.0" encoding="UTF-8"?>
<svg width="72" height="72" viewBox="0 0 72 72" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Modern gradient: Blue 700 → Blue 900 -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1976d2;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0d47a1;stop-opacity:1" />
    </linearGradient>
    
    <!-- Subtle shadow for note -->
    <filter id="noteShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="1.08"/>
      <feOffset dx="0" dy="1.44"/>
      <feComponentTransfer>
        <feFuncA type="linear" slope="0.25"/>
      </feComponentTransfer>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Background with rounded corners -->
  <rect width="72" height="72" rx="12.959999999999999" fill="url(#bgGrad)"/>
  
  <!-- Note icon with shadow -->
  <g filter="url(#noteShadow)">
    <!-- White note paper -->
    <rect x="19.8" y="14.76" width="32.4" height="39.6" 
          rx="2.5200000000000005" fill="#ffffff"/>
    
    <!-- Note lines (subtle blue) -->
    <line x1="25.632" y1="26.64" 
          x2="46.367999999999995" y2="26.64" 
          stroke="#1565c0" stroke-width="1.5" 
          stroke-linecap="round" opacity="0.35"/>
    <line x1="25.632" y1="33.768" 
          x2="46.367999999999995" y2="33.768" 
          stroke="#1565c0" stroke-width="1.5" 
          stroke-linecap="round" opacity="0.35"/>
    <line x1="25.632" y1="40.896" 
          x2="39.239999999999995" y2="40.896" 
          stroke="#1565c0" stroke-width="1.5" 
          stroke-linecap="round" opacity="0.35"/>
    
    <!-- Folded corner accent -->
    <path d="M 45.072 14.76 
             L 52.2 14.76 
             L 52.2 21.887999999999998 
             Q 50.580000000000005 20.7
               45.72 17.928 Z" 
          fill="#e3f2fd" opacity="0.8"/>
  </g>
</svg>