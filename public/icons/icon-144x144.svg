<?xml version="1.0" encoding="UTF-8"?>
<svg width="144" height="144" viewBox="0 0 144 144" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Modern gradient: Blue 700 → Blue 900 -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1976d2;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0d47a1;stop-opacity:1" />
    </linearGradient>
    
    <!-- Subtle shadow for note -->
    <filter id="noteShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="2.16"/>
      <feOffset dx="0" dy="2.88"/>
      <feComponentTransfer>
        <feFuncA type="linear" slope="0.25"/>
      </feComponentTransfer>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Background with rounded corners -->
  <rect width="144" height="144" rx="25.919999999999998" fill="url(#bgGrad)"/>
  
  <!-- Note icon with shadow -->
  <g filter="url(#noteShadow)">
    <!-- White note paper -->
    <rect x="39.6" y="29.52" width="64.8" height="79.2" 
          rx="5.040000000000001" fill="#ffffff"/>
    
    <!-- Note lines (subtle blue) -->
    <line x1="51.264" y1="53.28" 
          x2="92.73599999999999" y2="53.28" 
          stroke="#1565c0" stroke-width="1.5" 
          stroke-linecap="round" opacity="0.35"/>
    <line x1="51.264" y1="67.536" 
          x2="92.73599999999999" y2="67.536" 
          stroke="#1565c0" stroke-width="1.5" 
          stroke-linecap="round" opacity="0.35"/>
    <line x1="51.264" y1="81.792" 
          x2="78.47999999999999" y2="81.792" 
          stroke="#1565c0" stroke-width="1.5" 
          stroke-linecap="round" opacity="0.35"/>
    
    <!-- Folded corner accent -->
    <path d="M 90.144 29.52 
             L 104.4 29.52 
             L 104.4 43.775999999999996 
             Q 101.16000000000001 41.4
               91.44 35.856 Z" 
          fill="#e3f2fd" opacity="0.8"/>
  </g>
</svg>