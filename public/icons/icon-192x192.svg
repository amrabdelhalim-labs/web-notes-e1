<?xml version="1.0" encoding="UTF-8"?>
<svg width="192" height="192" viewBox="0 0 192 192" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Modern gradient: Blue 700 → Blue 900 -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1976d2;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0d47a1;stop-opacity:1" />
    </linearGradient>
    
    <!-- Subtle shadow for note -->
    <filter id="noteShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="2.88"/>
      <feOffset dx="0" dy="3.84"/>
      <feComponentTransfer>
        <feFuncA type="linear" slope="0.25"/>
      </feComponentTransfer>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Background with rounded corners -->
  <rect width="192" height="192" rx="34.56" fill="url(#bgGrad)"/>
  
  <!-- Note icon with shadow -->
  <g filter="url(#noteShadow)">
    <!-- White note paper -->
    <rect x="52.8" y="39.36" width="86.4" height="105.60000000000001" 
          rx="6.720000000000001" fill="#ffffff"/>
    
    <!-- Note lines (subtle blue) -->
    <line x1="68.352" y1="71.03999999999999" 
          x2="123.648" y2="71.03999999999999" 
          stroke="#1565c0" stroke-width="1.536" 
          stroke-linecap="round" opacity="0.35"/>
    <line x1="68.352" y1="90.04799999999999" 
          x2="123.648" y2="90.04799999999999" 
          stroke="#1565c0" stroke-width="1.536" 
          stroke-linecap="round" opacity="0.35"/>
    <line x1="68.352" y1="109.05599999999998" 
          x2="104.64" y2="109.05599999999998" 
          stroke="#1565c0" stroke-width="1.536" 
          stroke-linecap="round" opacity="0.35"/>
    
    <!-- Folded corner accent -->
    <path d="M 120.19199999999998 39.36 
             L 139.2 39.36 
             L 139.2 58.367999999999995 
             Q 134.88 55.2
               121.91999999999999 47.808 Z" 
          fill="#e3f2fd" opacity="0.8"/>
  </g>
</svg>