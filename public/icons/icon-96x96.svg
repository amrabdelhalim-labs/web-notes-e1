<?xml version="1.0" encoding="UTF-8"?>
<svg width="96" height="96" viewBox="0 0 96 96" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Modern gradient: Blue 700 → Blue 900 -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1976d2;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0d47a1;stop-opacity:1" />
    </linearGradient>
    
    <!-- Subtle shadow for note -->
    <filter id="noteShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="1.44"/>
      <feOffset dx="0" dy="1.92"/>
      <feComponentTransfer>
        <feFuncA type="linear" slope="0.25"/>
      </feComponentTransfer>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Background with rounded corners -->
  <rect width="96" height="96" rx="17.28" fill="url(#bgGrad)"/>
  
  <!-- Note icon with shadow -->
  <g filter="url(#noteShadow)">
    <!-- White note paper -->
    <rect x="26.4" y="19.68" width="43.2" height="52.800000000000004" 
          rx="3.3600000000000003" fill="#ffffff"/>
    
    <!-- Note lines (subtle blue) -->
    <line x1="34.176" y1="35.519999999999996" 
          x2="61.824" y2="35.519999999999996" 
          stroke="#1565c0" stroke-width="1.5" 
          stroke-linecap="round" opacity="0.35"/>
    <line x1="34.176" y1="45.023999999999994" 
          x2="61.824" y2="45.023999999999994" 
          stroke="#1565c0" stroke-width="1.5" 
          stroke-linecap="round" opacity="0.35"/>
    <line x1="34.176" y1="54.52799999999999" 
          x2="52.32" y2="54.52799999999999" 
          stroke="#1565c0" stroke-width="1.5" 
          stroke-linecap="round" opacity="0.35"/>
    
    <!-- Folded corner accent -->
    <path d="M 60.09599999999999 19.68 
             L 69.6 19.68 
             L 69.6 29.183999999999997 
             Q 67.44 27.6
               60.959999999999994 23.904 Z" 
          fill="#e3f2fd" opacity="0.8"/>
  </g>
</svg>